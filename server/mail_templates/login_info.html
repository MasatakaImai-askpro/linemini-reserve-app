<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>店舗管理システム アカウント発行のお知らせ</title>
</head>

<body
    style="margin: 0; padding: 20px; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; color: #333333; background-color: #f9f9f9;">

    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%"
        style="max-width: 600px; background-color: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">

        <tr>
            <td style="background-color: #4f46e5; padding: 24px; text-align: center;">
                <h1 style="margin: 0; color: #ffffff; font-size: 20px; font-weight: bold; letter-spacing: 0.5px;">
                    店舗アカウント発行のお知らせ</h1>
            </td>
        </tr>

        <tr>
            <td style="padding: 32px 24px;">
                <p style="margin-top: 0; margin-bottom: 16px; font-size: 15px; line-height: 1.6;">管理者様</p>
                <p style="margin-top: 0; margin-bottom: 24px; font-size: 15px; line-height: 1.6; color: #4b5563;">
                    お世話になっております。<br>
                    店舗の追加が完了しましたので、店舗管理画面用のユーザ名とパスワードをお送りします。<br>
                    店舗ご担当者様へご共有のほど、よろしくお願いいたします。
                </p>

            <table border="0" cellpadding="0" cellspacing="0" width="100%"
                style="background-color: #f3f4f6; border-radius: 6px; margin-bottom: 24px;">
                <tr>
                    <td style="padding: 20px;">
                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                            <tr>
                                <td width="100"
                                    style="padding-bottom: 12px; font-size: 14px; font-weight: bold; color: #374151; vertical-align: top; white-space: nowrap;">
                                    店舗名</td>
                                <td
                                    style="padding-bottom: 12px; font-size: 14px; font-weight: bold; color: #4f46e5; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;">
                                    {{shopname}}</td>
                            </tr>
                            <tr>
                                <td width="100"
                                    style="padding-bottom: 12px; font-size: 14px; font-weight: bold; color: #374151; vertical-align: top; white-space: nowrap;">
                                    ユーザ名</td>
                                <td
                                    style="padding-bottom: 12px; font-size: 14px; font-weight: bold; color: #4f46e5; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;">
                                    {{username}}</td>
                            </tr>
                            <tr>
                                <td width="100"
                                    style="padding-bottom: 12px; font-size: 14px; font-weight: bold; color: #374151; vertical-align: top; white-space: nowrap;">
                                    パスワード</td>
                                <td
                                    style="padding-bottom: 12px; font-size: 14px; font-weight: bold; color: #4f46e5; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;">
                                    {{password}}</td>
                            </tr>
                            <tr>
                                <td width="100"
                                    style="font-size: 14px; font-weight: bold; color: #374151; vertical-align: top; white-space: nowrap;">
                                    ログインURL</td>
                                <td
                                    style="font-size: 14px; font-weight: bold; color: #4f46e5; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; word-break: break-all;">
                                    https://kanagawa-smilemap.jp/login</td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>

                <table border="0" cellpadding="0" cellspacing="0" width="100%"
                    style="border-top: 1px solid #e5e7eb; padding-top: 16px;">
                    <tr>
                        <td>
                            <ul
                                style="margin: 0; padding-left: 20px; font-size: 13px; color: #6b7280; line-height: 1.5;">
                                <!-- <li style="margin-bottom: 6px;">セキュリティ保護のため、初回ログイン後は速やかにパスワードの変更をお願いいたします。</li> -->
                                <li>本メールは、紛失しないよう大切に保管してください。</li>
                            </ul>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <tr>
            <td
                style="background-color: #f9fafb; padding: 16px 24px; text-align: center; border-top: 1px solid #e5e7eb;">
                <p style="margin: 0; font-size: 12px; color: #9ca3af;">&copy; 店舗管理システム All Rights Reserved.</p>
            </td>
        </tr>

    </table>

</body>

</html>
